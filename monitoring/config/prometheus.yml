# Scrape config used by VictoriaMetrics in Prometheus-compatible mode.
# Installed to /etc/victoriametrics/prometheus.yml by install.sh.

global:
  scrape_interval: 30s
  scrape_timeout: 10s
  external_labels:
    host: filescopemcp-llm

scrape_configs:
  - job_name: llamacpp
    metrics_path: /metrics
    static_configs:
      - targets: ['localhost:8880']
        labels:
          model: qwen3.6-35b-a3b

  - job_name: node
    static_configs:
      - targets: ['localhost:8882']

  - job_name: victoriametrics
    metrics_path: /metrics
    static_configs:
      - targets: ['localhost:8881']
