# systemd drop-in for grafana-server.service.
# Installed to /etc/systemd/system/grafana-server.service.d/overrides.conf.
# Caps memory and disables features we don't need (analytics + alerting).

[Service]
Environment=GF_SERVER_HTTP_PORT=8881
Environment=GF_ANALYTICS_REPORTING_ENABLED=false
Environment=GF_ANALYTICS_CHECK_FOR_UPDATES=false
Environment=GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES=false
Environment=GF_UNIFIED_ALERTING_ENABLED=false
Environment=GF_ALERTING_ENABLED=false

MemoryHigh=200M
MemoryMax=300M
