# Provisioned datasource for Grafana.
# Installed to /etc/grafana/provisioning/datasources/victoriametrics.yml.

apiVersion: 1

datasources:
  - name: VictoriaMetrics
    type: prometheus
    access: proxy
    url: http://localhost:8882
    isDefault: true
    jsonData:
      httpMethod: POST
      timeInterval: 30s
